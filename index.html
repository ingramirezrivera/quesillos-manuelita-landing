      <div style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#1e293b; flex-direction:column;">
        <img src="/src/assets/images/logos/logo.jpeg" alt="Quesillos Manuelita Logo" style="width: 120px; height: auto; border-radius: 16px; margin-bottom: 2rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); opacity: 0; animation: fadeInLogo 0.6s ease-out 0.3s forwards;" />

      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes fadeInLogo {
          0% { opacity: 0; transform: scale(0.85); }
          100% { opacity: 1; transform: scale(1); }
        }
      </style>
